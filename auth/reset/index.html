<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Reset your password — BumbleTasks</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #F7F4EF; color: #2C2416;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center; padding: 24px;
    }
    @media (prefers-color-scheme: dark) { body { background: #1c1a17; color: #F7F4EF; } }
    main { max-width: 360px; }
    img { width: 72px; height: 72px; margin-bottom: 16px; }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { font-size: 15px; line-height: 1.5; color: #6b7280; margin: 0 0 20px; }
    .btn {
      display: inline-block; background: #C8973A; color: #fff; text-decoration: none;
      font-weight: 600; padding: 14px 28px; border-radius: 14px; font-size: 16px;
    }
    .hint { font-size: 13px; margin-top: 20px; }
  </style>
</head>
<body>
  <main>
    <img src="/bumbletask-1.png" alt="BumbleTasks">
    <h1>Opening BumbleTasks…</h1>
    <p>Finish resetting your password in the app.</p>
    <p><a id="open" class="btn" href="#">Open BumbleTasks</a></p>
    <p class="hint">If the app didn't open automatically, make sure BumbleTasks is installed and tap the button above.</p>
  </main>
  <script>
    // Forward the one-time recovery credential (token_hash & type) into the app.
    // A link scanner/pre-fetcher that loads this page does NOT call verifyOtp, so the
    // token is only consumed when the real device opens the app — no more "expired".
    (function () {
      var params = window.location.search || '';
      var appUrl = 'bumbletasks://auth/reset-password' + params;
      document.getElementById('open').setAttribute('href', appUrl);
      window.location.replace(appUrl);
    })();
  </script>
</body>
</html>
